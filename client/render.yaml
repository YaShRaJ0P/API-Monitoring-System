services:
  - type: web
    name: monito-client
    env: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://api-monitoring-system-server-test.onrender.com/api/v1/*
      - type: rewrite
        source: /*
        destination: /index.html